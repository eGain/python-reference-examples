<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Chat</title>
    <style>
        /* Dark theme (default) */
        :root, [data-theme="dark"] {
            --bg: #0f0f12;
            --surface: #18181c;
            --border: #2a2a2e;
            --text: #e4e4e7;
            --text-muted: #71717a;
            --accent: #B91D8F;
            --accent-hover: #d424a8;
        }
        [data-theme="light"] {
            --bg: #f4f4f5;
            --surface: #ffffff;
            --border: #e4e4e7;
            --text: #18181b;
            --text-muted: #71717a;
            --accent: #B91D8F;
            --accent-hover: #9a1878;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2.5rem;
            max-width: 420px;
            width: 100%;
            text-align: center;
        }
        .card h1 { font-size: 1.5rem; margin: 0 0 0.5rem 0; }
        .card p { color: var(--text-muted); margin: 0 0 1.5rem 0; line-height: 1.5; }
        .card .login-required-msg { color: var(--accent); margin-bottom: 1rem; font-size: 0.95rem; }
        .btn-login {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            background: var(--accent);
            color: var(--bg);
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            border: none;
            cursor: pointer;
        }
        .btn-login:hover { background: var(--accent-hover); }
        .theme-toggle {
            position: absolute;
            top: 1rem;
            right: 1rem;
            padding: 0.35rem 0.6rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 0.85rem;
            cursor: pointer;
        }
        .theme-toggle:hover { border-color: var(--accent); color: var(--accent); }
    </style>
</head>
<body>
    <button type="button" class="theme-toggle" id="themeToggle" aria-label="Toggle light/dark mode">Dark</button>
    <div class="card">
        <h1>Knowledge Chat</h1>
        <p id="loginPrompt" class="login-required-msg" style="display: none;">Please log in again.</p>
        <p>Ask questions and get answers from your knowledge base. Sign in to continue.</p>
        <a href="{{ url_for('login') }}" class="btn-login">Login with eGain</a>
    </div>
    <script>
        (function() {
            var params = new URLSearchParams(window.location.search);
            if (params.get('login_required') === '1') {
                var el = document.getElementById('loginPrompt');
                if (el) el.style.display = 'block';
            }
        })();
        (function() {
            var STORAGE_KEY = 'knowledge-chat-theme';
            var theme = localStorage.getItem(STORAGE_KEY) || (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
            document.documentElement.setAttribute('data-theme', theme);
            var btn = document.getElementById('themeToggle');
            btn.textContent = theme === 'dark' ? 'Dark' : 'Light';
            btn.addEventListener('click', function() {
                theme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
                document.documentElement.setAttribute('data-theme', theme);
                localStorage.setItem(STORAGE_KEY, theme);
                btn.textContent = theme === 'dark' ? 'Dark' : 'Light';
            });
        })();
    </script>
</body>
</html>
