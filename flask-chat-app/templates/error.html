<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - Knowledge Chat</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f12;
            color: #e4e4e7;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            margin: 0;
        }
        .error-card {
            background: #18181c;
            padding: 2rem;
            border-radius: 12px;
            border: 1px solid #2a2a2e;
            max-width: 480px;
            text-align: center;
        }
        h1 { font-size: 1.25rem; margin-bottom: 1rem; }
        p { color: #71717a; margin-bottom: 1.5rem; line-height: 1.6; }
        a { color: #a78bfa; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="error-card">
        <h1>Something went wrong</h1>
        <p>{{ error }}</p>
        <a href="{{ url_for('index') }}">Return to Chat</a>
    </div>
</body>
</html>
